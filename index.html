<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>momizo relaxation salon</title>

  <link rel="preload" as="image" href="image_1.jpg" fetchpriority="high" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#000;
      --text:rgba(245,245,245,0.82);
      --jp:rgba(245,245,245,0.88);
      --muted:rgba(245,245,245,0.62);
      --accent:#c9a063;
      --accent-soft:rgba(201,160,99,0.28);
      --ease:cubic-bezier(0.22,1,0.36,1);
    }

    *{box-sizing:border-box;}

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      -webkit-font-smoothing:antialiased;
      -webkit-text-size-adjust:100%;
      font-size:16px;
    }

    a{
      -webkit-tap-highlight-color:transparent;
      text-decoration:none;
      color:inherit;
    }

    .main-container{
      position:relative;
      width:100%;
      min-height:calc(100dvh + 6vh);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:calc(env(safe-area-inset-top) + 10vh) 6vw env(safe-area-inset-bottom);
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.82)),
        url('image_1.jpg') center/cover no-repeat;
    }

    .content{
      text-align:center;
      width:min(92vw,720px);
    }

    @keyframes fadeInUp{
      from{opacity:0;transform:translateY(14px);}
      to{opacity:1;transform:translateY(0);}
    }

    .catch-group{
      margin-bottom:6vmin;
      opacity:0;
      animation:fadeInUp 1.6s var(--ease) forwards;
    }

    .group-1{animation-delay:.5s;}
    .group-2{animation-delay:.9s;}

    .en{
      font-family:system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
      font-weight:300;
      color:var(--muted);
      font-size:clamp(20px,5.2vmin,52px);
      line-height:1.5;
      letter-spacing:0.02em;
      margin:0 0 1.2vmin;
    }

    .jp{
      font-family:'Shippori Mincho',serif;
      font-weight:500;
      color:var(--jp);
      font-size:clamp(14px,2.6vmin,18px);
      letter-spacing:0.22em;
      line-height:1.9;
      margin:0;
    }

    .booking-button{
      display:inline-block;
      width:min(84vw,360px);
      margin-top:4vmin;
      padding:3.2vmin 0;
      border:1px solid var(--accent);
      color:var(--accent);
      font-family:system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
      font-weight:300;
      font-size:clamp(15px,3.6vmin,20px);
      letter-spacing:0.18em;
      position:relative;
      transition:.3s var(--ease);
    }

    .booking-button:hover{
      background:rgba(201,160,99,0.08);
      transform:translateY(-1px);
    }

    .booking-button:active{
      transform:scale(0.98);
    }

    .note{
      display:block;
      margin-top:1vmin;
      font-family:'Shippori Mincho',serif;
      font-size:clamp(12px,2.2vmin,14px);
      color:rgba(245,245,245,0.6);
      letter-spacing:0.15em;
    }

    @media (orientation:landscape){
      .en{
        font-size:clamp(18px,4vh,44px);
      }
      .jp{
        font-size:clamp(13px,2.2vh,16px);
      }
      .content{
        width:min(78vw,620px);
      }
    }

    @media (prefers-reduced-motion:reduce){
      *{
        animation:none!important;
        transition:none!important;
      }
      .catch-group{opacity:1;transform:none;}
    }
  </style>
</head>

<body>

  <main class="main-container">

    <article class="content">

      <section class="catch-group group-1">
        <p class="en">Pause the noise.<br>Return to your breath.</p>
        <p class="jp">喧騒を止め、呼吸のリズムを感じる。</p>
      </section>

      <section class="catch-group group-2">
        <p class="en">Reclaim the space for your body.</p>
        <p class="jp">心と体に、余白を取り戻す。</p>
      </section>

      <a class="booking-button" href="https://book.squareup.com/appointments/tli4clkb20flxc/location/LZPVZXQ5CZ1A5/services">
        CHOOSE STAFF
        <span class="note">スタッフを選んで予約する</span>
      </a>

    </article>

  </main>

</body>
</html>
