<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOMIZO | ENTER</title>
    <style>
        :root {
            --bg-color: #030303;
            --text-main: rgba(255, 255, 255, 0.94);
            --text-sub: rgba(255, 255, 255, 0.45);
            --text-ghost: rgba(255, 255, 255, 0.18);
            --line-color: rgba(255, 255, 255, 0.12);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        html { background-color: var(--bg-color); }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "YuMincho", "Hiragino Mincho ProN", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 101vh; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: "";
            position: fixed;
            top: -5%; left: -5%; width: 110%; height: 110%;
            background: url("image_1.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            opacity: 0.65;
            pointer-events: none;
            z-index: 1;
            animation: spaceBreath 90s infinite alternate ease-in-out;
            filter: contrast(1.1) brightness(0.85);
        }

        @keyframes spaceBreath {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.03) translate(5px, 2px); }
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 2;
        }

        .frame {
            position: relative;
            width: 85%;
            max-width: 500px;
            height: 60vh;
            border-left: 0.5px solid var(--line-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-left: 45px;
            z-index: 10;
            animation: lineFade 2.5s ease-out forwards;
        }

        @keyframes lineFade {
            from { opacity: 0; height: 0; }
            to { opacity: 1; height: 60vh; }
        }

        .title {
            font-size: 2.1rem;
            font-weight: 100;
            margin: 0;
            line-height: 1;
            letter-spacing: 0.55em;
            animation: titleBreath 26.3s ease-in-out infinite;
        }

        @keyframes titleBreath {
            0%, 33%, 66%, 100% { opacity: 0.85; filter: blur(0.3px); }
            16%, 49%, 82% { opacity: 1; filter: blur(0px); }
        }

        .title-sub {
            font-size: 0.72rem;
            letter-spacing: 0.38em;
            color: var(--text-ghost);
            margin-top: 16px;
            display: block;
        }

        .message {
            font-size: 0.88rem;
            line-height: 3.2;
            letter-spacing: 0.22em;
            color: var(--text-sub);
            margin-top: 55px;
        }

        .btn-wrap {
            margin-top: auto;
            margin-bottom: 10px;
        }

        /* リンク設定：初期状態を引き締め */
        .reserve-link {
            display: inline-block;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.78rem;
            letter-spacing: 0.5em;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            padding: 20px 60px; 
            background: transparent;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            z-index: 20;
            animation: heartBeat 12s infinite ease-in-out;
            -webkit-touch-callout: none;
        }

        @keyframes heartBeat {
            0%, 70%, 100% { box-shadow: 0 0 10px rgba(255, 255, 255, 0); }
            75% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.05); }
            85% { box-shadow: 0 0 25px rgba(255, 255, 255, 0.08); }
        }

        /* PCホバー時 */
        @media (hover: hover) {
            .reserve-link:hover {
                background: rgba(255, 255, 255, 0.96);
                color: #000;
                letter-spacing: 0.7em;
                padding: 20px 80px;
            }
        }

        /* スマホタップ時：即座に反応し、指を離すとtransitionで戻る */
        .reserve-link:active {
            background: rgba(255, 255, 255, 0.96) !important;
            color: #000 !important;
            letter-spacing: 0.6em;
            transition: all 0.05s ease;
        }

        .line-link {
            position: fixed;
            bottom: 40px;
            right: 40px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            letter-spacing: 0.2em;
            z-index: 20;
            transition: color 0.6s;
            -webkit-touch-callout: none;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        @keyframes zenFlash {
            0% { background: #000; opacity: 1; }
            12% { background: rgba(255, 248, 240, 0.02); opacity: 1; }
            30%, 100% { background: #000; opacity: 1; }
        }

        /* --- スマホ専用調整 --- */
        @media screen and (max-width: 900px) {
            /* 縦でも横でもMOMIZOの文字間を広げる */
            .title { 
                font-size: 1.8rem; 
                letter-spacing: 0.8em !important; 
                text-indent: 0.8em; /* 中央揃えを維持するための補正 */
            }
            .frame { padding-left: 25px; }
            
            /* ボタンはスマホ時のみ横幅を活かすが、デカすぎないように制限 */
            .reserve-link {
                width: 100%;
                max-width: 280px;
                text-align: center;
                padding: 18px 0;
            }
        }

        /* 横向き時のさらなる微調整 */
        @media screen and (orientation: landscape) and (max-height: 500px) {
            .frame { height: 75vh; }
            .message { margin-top: 20px; line-height: 2.2; }
        }
    </style>
</head>
<body ontouchstart="">

    <div id="overlay"></div>

    <div class="frame">
        <div class="content-inner">
            <h1 class="title">MOMIZO</h1>
            <span class="title-sub">静寂の、その先へ。</span>
            <div class="message">
                呼吸を整える。<br>
                それだけで、世界は変わる。
            </div>
        </div>

        <div class="btn-wrap">
            <a href="#" class="reserve-link" id="enter-btn">ENTER</a>
        </div>
    </div>

    <a href="https://page.line.me/cvj7583f" class="line-link">Contact via Line</a>

    <script>
        window.addEventListener("load", () => {
            setTimeout(() => { window.scrollTo(0, 1); }, 100);
        });

        const btn = document.getElementById('enter-btn');

        // タップ終了時にフォーカスを強制解除
        const endTouch = () => { setTimeout(() => btn.blur(), 150); };
        btn.addEventListener('touchend', endTouch);
        btn.addEventListener('touchcancel', endTouch);

        btn.addEventListener('click', function(e) {
            e.preventDefault();
            const overlay = document.getElementById('overlay');
            overlay.style.visibility = 'visible';
            overlay.style.animation = 'zenFlash 1.2s forwards';
            setTimeout(() => {
                window.location.href = "https://book.squareup.com/appointments/tli4clkb20flxc/location/LZPVZXQ5CZ1A5/services";
            }, 1100);
        });
    </script>
</body>
</html>
