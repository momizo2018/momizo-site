<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOMIZO | ENTER</title>
    <style>
        :root {
            --bg-color: #030303;
            --text-main: rgba(255, 255, 255, 0.94);
            --text-sub: rgba(255, 255, 255, 0.45);
            --text-ghost: rgba(255, 255, 255, 0.18);
            --line-color: rgba(255, 255, 255, 0.12);
            --bg-loaded: none;
            --bg-opacity: 0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "YuMincho", "Hiragino Mincho ProN", serif;
            font-weight: 300;
            /* ステータスバーを隠すためのスクロール領域 */
            min-height: 125vh; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* 背景：深淵とディテールの究極バランス */
        body::before {
            content: "";
            position: fixed;
            top: -5%; left: -5%; width: 110%; height: 110%;
            background-image: var(--bg-loaded);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            opacity: var(--bg-opacity);
            pointer-events: none;
            z-index: 1;
            transition: opacity 1.2s ease;
            animation: spaceBreath 90s infinite alternate ease-in-out;
            filter: contrast(1.08) brightness(0.82);
        }

        @keyframes spaceBreath {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.03) translate(5px, 2px); }
        }

        /* 粒子感のレイヤー */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 2;
        }

        .frame {
            position: fixed;
            top: 50svh; /* ブラウザUIに左右されない動的センタリング */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 500px;
            border-left: 0.35px solid var(--line-color); 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* 端末幅に応じた最適な余白の追求 */
            padding-left: clamp(28px, 6vw, 45px);
            z-index: 10;
            animation: lineFade 2.5s ease-out forwards;
        }

        @keyframes lineFade {
            from { opacity: 0; min-height: 0; }
            to { opacity: 1; min-height: 60vh; }
        }

        .title {
            font-size: 2.1rem;
            font-weight: 100;
            margin: 0;
            line-height: 1;
            animation: titleBreath 21s ease-in-out infinite;
        }

        @keyframes titleBreath {
            0%, 33%, 66%, 100% { letter-spacing: 0.52em; opacity: 0.85; filter: blur(0.3px); }
            16%, 49%, 82% { letter-spacing: 0.63em; opacity: 1; filter: blur(0px); }
        }

        .title-sub {
            font-size: 0.72rem;
            letter-spacing: 0.38em;
            color: var(--text-ghost);
            margin-top: 10px;
            display: block;
        }

        .message {
            font-size: 0.88rem;
            line-height: clamp(2.4, 2.2vh, 2.8);
            letter-spacing: 0.22em;
            color: var(--text-sub);
            margin-top: 45px;
        }

        .btn-wrap {
            margin-top: auto;
            margin-bottom: 10px;
        }

        .reserve-link {
            display: inline-block;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.78rem;
            letter-spacing: 0.5em;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            padding: 22px 80px;
            background: transparent;
            transition: all 0.8s cubic-bezier(0.15, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            z-index: 20;
        }

        @media (hover: hover) {
            .reserve-link:hover {
                background: rgba(255, 255, 255, 0.96);
                color: #000;
                letter-spacing: 0.8em;
                padding: 22px 90px;
            }
        }

        .reserve-link.touched {
            transform: scale(0.97);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            background: rgba(255, 255, 255, 0.03);
        }

        /* 視認性と静寂を両立させた位置調整 */
        .line-link {
            position: fixed;
            bottom: 32px;
            right: 32px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            text-decoration: none;
            letter-spacing: 0.2em;
            z-index: 20;
            transition: color 0.6s;
        }

        @media (hover: hover) {
            .line-link:hover { color: #fff; }
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        @keyframes zenFlash {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* =========================================
           スマートフォン最適化
        ========================================= */

        @media (max-width: 768px) {
            .frame {
                /* padding-left は clamp により自動最適化 */
                animation: lineFadeMobile 2.5s ease-out forwards;
            }
            @keyframes lineFadeMobile {
                from { opacity: 0; min-height: 0; }
                to { opacity: 1; min-height: 65vh; }
            }
            .title {
                font-size: 1.8rem;
                margin-top: -10px;
            }
            .reserve-link {
                padding: 18px 55px;
                font-size: 0.7rem;
            }
            /* 小さなスマホでも 32px を基準に安定 */
            .line-link {
                bottom: 32px;
                right: 32px;
            }
        }

        /* 横向き：静寂の最適化 */
        @media (max-height: 500px) and (orientation: landscape) {
            body { min-height: 150vh; }
            .frame {
                top: 50svh;
                animation: lineFadeLandscape 2.5s ease-out forwards;
            }
            @keyframes lineFadeLandscape {
                from { opacity: 0; min-height: 0; }
                to { opacity: 1; min-height: 75vh; }
            }
            .title {
                font-size: 1.5rem;
                letter-spacing: 0.35em;
                filter: blur(0.4px);
            }
            .message {
                margin-top: 15px;
                line-height: 2;
            }
            .reserve-link {
                padding: 12px 40px;
            }
        }
    </style>
</head>
<body data-bg="image_1.jpg">

    <div id="overlay"></div>

    <div class="frame">
        <div class="content-inner">
            <h1 class="title">MOMIZO</h1>
            <span class="title-sub">静寂の、その先へ。</span>
            <div class="message">
                呼吸を整える。<br>
                それだけで、世界は変わる。
            </div>
        </div>

        <div class="btn-wrap">
            <a href="#" class="reserve-link" id="enter-btn">ENTER</a>
        </div>
    </div>

    <a href="https://page.line.me/cvj7583f" class="line-link">Contact via Line</a>

    <script>
        // 背景の確実な立ち上がり（Safari 2フレーム遅延対策）
        window.addEventListener("load", () => {
            const bg = document.body.dataset.bg;
            document.body.style.setProperty("--bg-loaded", `url(${bg})`);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    document.body.style.setProperty("--bg-opacity", "0.65");
                });
            });
        });

        const enterBtn = document.getElementById('enter-btn');
        const overlay = document.getElementById('overlay');
        const targetUrl = "https://book.squareup.com/appointments/tli4clkb20flxc/location/LZPVZXQ5CZ1A5/services";

        function startTransition() {
            overlay.style.visibility = 'visible';
            overlay.style.animation = 'zenFlash 0.9s forwards';
        }

        // アニメーション完了と遷移の完全同期
        overlay.addEventListener("animationend", () => {
            window.location.href = targetUrl;
        });

        // タッチ操作の極致（二重反応防止 ＋ 即時レスポンス）
        enterBtn.addEventListener("touchstart", (e) => {
            e.preventDefault(); 
            enterBtn.classList.add("touched");
            startTransition();
        }, {passive: false});

        // PC環境用のクリックイベント
        enterBtn.addEventListener('click', (e) => {
            if (e.pointerType === 'touch') return;
            startTransition();
        });
    </script>
</body>
</html>
