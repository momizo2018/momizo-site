<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MOMIZO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* --- 1. 土台：100%で画面を満たす --- */
    html, body {
      margin: 0; padding: 0;
      background: #000;
      height: 100%; width: 100%;
    }

    .main {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      /* 背景：常に面を100%カバー。比率が変われば自動で追従。 */
      background:
        radial-gradient(circle at 50% 40%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,1)),
        url('image_1.jpg') center / cover no-repeat;
      padding: 5%; /* 余白を画面サイズに対する比率に */
    }

    /* --- 2. 構造：幅を％で定義し、最大値（max-width）だけで抑制 --- */
    .content {
      width: 85%;
      max-width: 500px; /* 広がりすぎを防ぐ唯一の蓋 */
      z-index: 10;
    }

    .block {
      margin-bottom: 10%; /* 縦方向の呼吸も比率で */
    }

    /* --- 3. タイポグラフィ：ここもpxを捨てて相対値に --- */
    .en {
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 300;
      font-size: 1.4rem; /* 基本サイズを基準に */
      line-height: 1.6;
      letter-spacing: 0.05em;
      color: rgba(235, 235, 235, 0.85);
      margin-bottom: 3%;
    }

    .jp {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      line-height: 2;
      color: rgba(235, 235, 235, 0.7);
    }

    .cta-wrap {
      margin-top: 12%;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%; /* 親（content）の幅に従う */
      max-width: 280px; /* ボタンとして適切なサイズで止める */
      padding: 1.1rem 0;
      border: 1px solid rgba(184, 146, 92, 0.4);
      color: rgba(184, 146, 92, 0.8);
      font-family: system-ui, sans-serif;
      text-decoration: none;
      letter-spacing: 0.3em;
      font-size: 0.85rem;
    }

    .btn-sub {
      display: block;
      margin-top: 4%;
      font-size: 0.65rem;
      color: rgba(235,235,235,0.3);
    }

    .footer {
      position: absolute; bottom: 3%; width: 100%;
      text-align: center; opacity: 0.15; font-size: 0.55rem;
    }
  </style>
</head>
<body>

  <main class="main">
    <div class="content">
      <section class="block">
        <p class="en">Pause the noise.<br>Return to your breath.</p>
        <p class="jp">喧騒を止め、呼吸のリズムを感じる。</p>
      </section>

      <section class="block">
        <p class="en">Reclaim the space for your body.</p>
        <p class="jp">心と体に、余白を取り戻す。</p>
      </section>

      <nav class="cta-wrap">
        <a class="btn" href="https://book.squareup.com/appointments/tli4clkb20flxc/location/LZPVZXQ5CZ1A5/services">RESERVE</a>
        <span class="btn-sub">予約・静かにお入りください</span>
      </nav>
    </div>
  </main>

  <footer class="footer">&copy; 2026 MOMIZO</footer>

</body>
</html>
