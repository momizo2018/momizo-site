<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>momizo relaxation salon</title>

  <link rel="preload" as="image" href="image_1.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet" />
  </noscript>

  <style>
    :root {
      --bg: #000;
      --gold: rgba(184,146,92,0.62);
      --gold-soft: rgba(184,146,92,0.22);
      --text: rgba(235,235,235,0.7);
      --jp: rgba(235,235,235,0.78);
      --muted: rgba(235,235,235,0.42);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      font-size: 16px;
      color: var(--text);
    }

    a {
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      color: inherit;
    }

    .site-header {
      position: absolute;
      top: env(safe-area-inset-top);
      left: 0;
      width: 100%;
      padding: 6vw;
      opacity: 0.18;
    }

    .header-logo {
      font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.4em;
      color: var(--gold);
      font-weight: 300;
    }

    .main {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: calc(env(safe-area-inset-top) + 12vh) 6vw env(safe-area-inset-bottom);
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.62), rgba(0,0,0,0.94)),
        url('image_1.jpg') center / cover no-repeat;
    }

    .content {
      width: min(92vw, 680px);
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .block {
      margin-bottom: 8vmin;
      opacity: 0;
      animation: fadeUp 1.4s var(--ease) forwards;
    }

    .block:nth-child(1) { animation-delay: 0.25s; }
    .block:nth-child(2) { animation-delay: 0.55s; }

    .en {
      font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-weight: 300;
      font-size: clamp(1.05rem, 4vw, 2.2rem);
      line-height: 1.6;
      letter-spacing: 0.01em;
      color: var(--muted);
      margin: 0 0 0.7rem;
    }

    .jp {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      letter-spacing: 0.18em;
      line-height: 2;
      color: var(--jp);
      margin: 0;
    }

    .cta-wrap {
      margin-top: 3.2rem;
      opacity: 0;
      animation: fadeUp 1.3s var(--ease) forwards;
      animation-delay: 0.9s;
    }

    .btn {
      display: inline-block;
      width: min(88vw, 340px);
      padding: 1.05rem 0;
      border: 1px solid var(--gold-soft);
      color: var(--gold);
      font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-weight: 300;
      letter-spacing: 0.32em;
      font-size: 0.95rem;
      position: relative;
      transition: 0.35s var(--ease);
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid rgba(184,146,92,0.18);
      opacity: 0;
      transition: 0.35s;
    }

    .btn:hover::before {
      inset: -6px;
      opacity: 1;
    }

    .btn:hover {
      background: rgba(184,146,92,0.03);
    }

    .btn:active { transform: scale(0.985); }

    .btn-sub {
      display: block;
      margin-top: 0.6rem;
      font-family: 'Shippori Mincho', serif;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      color: rgba(235,235,235,0.45);
    }

    .footer {
      margin-top: 11vh;
      opacity: 0.18;
    }

    .footer a {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: rgba(235,235,235,0.7);
      display: block;
      margin-bottom: 0.35rem;
    }

    .copyright {
      font-size: 0.55rem;
      letter-spacing: 0.04em;
      color: rgba(235,235,235,0.45);
    }
  </style>
</head>

<body>

  <header class="site-header">
    <a href="https://page.line.me/cvj7583f">
      <span class="header-logo">MOMIZO</span>
    </a>
  </header>

  <main class="main">
    <div class="content">

      <section class="block">
        <p class="en">Pause the noise.<br>Return to your breath.</p>
        <p class="jp">喧騒を止め、呼吸のリズムを感じる。</p>
      </section>

      <section class="block">
        <p class="en">Reclaim the space for your body.</p>
        <p class="jp">心と体に、余白を取り戻す。</p>
      </section>

      <div class="cta-wrap">
        <a class="btn" href="https://book.squareup.com/appointments/tli4clkb20flxc/location/LZPVZXQ5CZ1A5/services">
          RESERVE YOUR MOMENT
        </a>
        <span class="btn-sub">予約・静かにお入りください</span>
      </div>

      <footer class="footer">
        <a href="https://page.line.me/cvj7583f">OFFICIAL LINE</a>
        <p class="copyright">&copy; 2026 MOMIZO</p>
      </footer>

    </div>
  </main>

</body>
</html>
