<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOMIZO | ENTER</title>
    <style>
        :root {
            --bg-color: #030303;
            --text-main: rgba(255, 255, 255, 0.98);
            --text-sub: rgba(255, 255, 255, 0.75); /* 視認性向上のため不透明度UP */
            --text-ghost: rgba(255, 255, 255, 0.4);  /* 視認性向上のため不透明度UP */
            --line-color: rgba(255, 255, 255, 0.15);
            --bg-loaded: none;
            --bg-opacity: 0;
            --accent-bloom: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "YuMincho", "Hiragino Mincho ProN", serif;
            font-weight: 300;
            min-height: 125vh; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* 背景：画像と完全に同期する深淵の空気感 */
        body::before {
            content: "";
            position: fixed;
            top: -5%; left: -5%; width: 110%; height: 110%;
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.45)),
                var(--bg-loaded);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            opacity: var(--bg-opacity);
            pointer-events: none;
            z-index: 1;
            transition: opacity 1.5s ease;
            animation: spaceBreath 90s infinite alternate ease-in-out;
            filter: contrast(1.1) brightness(0.75);
        }

        @keyframes spaceBreath {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(8px, 4px); }
        }

        /* 粒子感のレイヤー */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 2;
        }

        .frame {
            position: fixed;
            top: 50svh;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            max-width: 500px;
            border-left: 0.5px solid var(--line-color); 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-left: clamp(24px, 7vw, 45px);
            z-index: 10;
            animation: lineFade 2.8s cubic-bezier(0.15, 1, 0.3, 1) forwards;
            /* テキストエリアの背後をわずかに暗くして浮かび上がらせる（環境制御） */
            background: radial-gradient(circle at 0% 50%, rgba(0,0,0,0.4) 0%, transparent 80%);
        }

        @keyframes lineFade {
            from { opacity: 0; min-height: 0; }
            to { opacity: 1; min-height: 62vh; }
        }

        .title {
            font-size: 2.2rem;
            font-weight: 200;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 15px var(--accent-bloom); /* Soft Bloom */
            animation: titleBreath 21s ease-in-out infinite;
        }

        @keyframes titleBreath {
            0%, 33%, 66%, 100% { letter-spacing: 0.52em; opacity: 0.9; filter: blur(0.3px); }
            16%, 49%, 82% { letter-spacing: 0.6em; opacity: 1; filter: blur(0px); }
        }

        .title-sub {
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            color: var(--text-ghost);
            margin-top: 12px;
            display: block;
            text-shadow: 0 0 8px rgba(0,0,0,0.8); /* 視認性確保のシャドウ */
        }

        .message {
            font-size: 0.92rem;
            line-height: 2.6;
            letter-spacing: 0.25em;
            color: var(--text-sub);
            margin-top: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        .btn-wrap {
            margin-top: auto;
            margin-bottom: 20px;
        }

        .reserve-link {
            display: inline-block;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.8rem;
            letter-spacing: 0.55em;
            border: 0.6px solid rgba(255, 255, 255, 0.25);
            padding: 22px 75px;
            background: transparent;
            transition: all 0.7s cubic-bezier(0.15, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            z-index: 20;
            overflow: hidden;
        }

        /* スマホ用のアクティブ状態フィードバック */
        .reserve-link:active, .reserve-link.touched {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.08);
            letter-spacing: 0.65em;
            transition: transform 0.15s ease-out;
        }

        @media (hover: hover) {
            .reserve-link:hover {
                background: rgba(255, 255, 255, 0.98);
                color: #000;
                letter-spacing: 0.85em;
                padding: 22px 85px;
            }
        }

        .line-link {
            position: fixed;
            bottom: 35px;
            right: 32px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            letter-spacing: 0.22em;
            z-index: 20;
            transition: color 0.6s, opacity 0.6s;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        @media (hover: hover) {
            .line-link:hover { color: #fff; }
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        @keyframes zenFlash {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* スマートフォン最適化 */
        @media (max-width: 768px) {
            .frame {
                animation: lineFadeMobile 2.8s ease-out forwards;
            }
            @keyframes lineFadeMobile {
                from { opacity: 0; min-height: 0; }
                to { opacity: 1; min-height: 64vh; }
            }
            .title {
                font-size: 1.9rem;
                margin-top: -5px;
            }
            .reserve-link {
                padding: 18px 50px;
                font-size: 0.72rem;
            }
            .line-link {
                bottom: 35px;
                right: 32px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            body { min-height: 150vh; }
            .frame {
                top: 50svh;
                animation: lineFadeLandscape 2.5s ease-out forwards;
            }
            @keyframes lineFadeLandscape {
                from { opacity: 0; min-height: 0; }
                to { opacity: 1; min-height: 72vh; }
            }
            .title { font-size: 1.5rem; }
            .message { margin-top: 10px; line-height: 2; }
            .reserve-link { padding: 10px 40px; }
        }
    </style>
</head>
<body data-bg="image_1.jpg">

    <div id="overlay"></div>

    <div class="frame">
        <div class="content-inner">
            <h1 class="title">MOMIZO</h1>
            <span class="title-sub">静寂の、その先へ。</span>
            <div class="message">
                呼吸を整える。<br>
                それだけで、世界は変わる。
            </div>
        </div>

        <div class="btn-wrap">
            <a href="#" class="reserve-link" id="enter-btn">ENTER</a>
        </div>
    </div>

    <a href="https://page.line.me/cvj7583f" class="line-link">Contact via Line</a>

    <script>
        const overlay = document.getElementById('overlay');
        const enterBtn = document.getElementById('enter-btn');
        const targetUrl = "https://book.squareup.com/appointments/tli4clkb20flxc/location/LZPVZXQ5CZ1A5/services";

        // 背景の確実な立ち上がり
        window.addEventListener("load", () => {
            const bg = document.body.dataset.bg;
            if (bg) {
                document.body.style.setProperty("--bg-loaded", `url(${bg})`);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        document.body.style.setProperty("--bg-opacity", "0.68");
                    });
                });
            }
        });

        // 【最重要】戻った時に真っ黒なのを防ぐ（bfcache対策）
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                // ブラウザの「戻る」で来た場合、オーバーレイをリセット
                overlay.style.animation = 'none';
                overlay.style.visibility = 'hidden';
                overlay.style.opacity = '0';
                enterBtn.classList.remove("touched");
            }
        });

        function startTransition() {
            overlay.style.visibility = 'visible';
            overlay.style.animation = 'zenFlash 1.0s cubic-bezier(0.4, 0, 0.2, 1) forwards';
        }

        // アニメーション完了と遷移
        overlay.addEventListener("animationend", (e) => {
            if (e.animationName === 'zenFlash') {
                window.location.href = targetUrl;
            }
        });

        // タッチ操作（二重反応防止 ＋ 即時レスポンス）
        enterBtn.addEventListener("touchstart", (e) => {
            // passive: false でスクロール干渉を防ぎつつ即時実行
            enterBtn.classList.add("touched");
            startTransition();
        }, {passive: true});

        // クリックイベント（PC用）
        enterBtn.addEventListener('click', (e) => {
            // pointerTypeがtouchの場合はtouchstart側に任せる
            if (e.pointerType === 'touch') return;
            startTransition();
        });
    </script>
</body>
</html>
